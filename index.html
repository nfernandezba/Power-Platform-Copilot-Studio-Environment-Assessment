.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
:focus-visible{outline:3px solid var(--blue);outline-offset:3px}
#bpf-wrap[hidden]{display:none!important}
#bpf{display:block}
.bpf-mobile{display:none}
.bpf-desktop{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.45rem;align-items:stretch}
.bpf-phase{width:100%;font-family:var(--font-b);text-align:left;color:inherit}
button.bpf-phase{appearance:none}
button.bpf-phase:disabled{opacity:1;cursor:default}
.bpf-progress-track{height:5px;border-radius:99px;background:var(--hairline);overflow:hidden}
.bpf-progress-fill{height:100%;border-radius:inherit;background:var(--spectrum);transition:width .3s ease}
.nav-progress{color:var(--muted);font-size:.73rem;font-weight:600;text-align:center;line-height:1.25}
.select-input,.text-input,.date-input,.mode-chip,.radio-option,.checkbox-option,.scale-chip,.btn{min-height:44px}
.mode-chip input,.radio-option input,.checkbox-option input{position:absolute!important;opacity:0!important;width:1px!important;height:1px!important;pointer-events:none}
.profile-card.has-error,.statement-card.has-error{border-color:var(--red);box-shadow:0 0 0 1px rgba(238,0,85,.22)}
.field-error{color:#ff7a9b;font-size:.78rem;font-weight:700;margin-top:.65rem;padding:.55rem .65rem;background:rgba(238,0,85,.09);border-radius:7px}
.field-error[hidden]{display:none}
.multi-summary{display:flex;justify-content:flex-end;align-items:center;margin:-.2rem 0 .55rem;color:var(--muted);font-size:.72rem;font-weight:700}
.checkbox-option.special-option{border-style:dashed}
.scale-row{display:grid;grid-template-columns:repeat(5,minmax(44px,1fr));gap:.5rem}
.scale-chip{display:flex;align-items:center;justify-content:center;padding:.5rem;min-width:0;font-family:var(--font-d);font-size:1rem;font-weight:700}
.scale-selected{margin-top:.7rem;padding:.72rem .82rem;border-radius:9px;background:rgba(11,11,15,.48);border:1px solid var(--hairline);min-height:64px}
.scale-selected strong{display:block;font-family:var(--font-d);font-size:.78rem;margin-bottom:.2rem}
.scale-selected span{display:block;color:var(--muted);font-size:.75rem;line-height:1.45}
.scale-selected.empty{color:var(--muted);font-size:.76rem;display:flex;align-items:center}

const PROFILE_STEPS=[
 {id:"profile-scale",kind:"profile",step:0,fields:["totalUsers","licensedUsers","activeMakers"]},
 {id:"profile-products",kind:"profile",step:1,fields:["productsCurrent","productsPlanned"]},
 {id:"profile-licensing",kind:"profile",step:2,fields:["licensing","inventory"]}
];
function uxText(key){const t={
 es:{profileSteps:["Escala y adopción","Productos actuales y previstos","Licenciamiento y módulos"],step:"Paso",of:"de",allSteps:"Ver etapas",hideSteps:"Ocultar etapas",completed:"completadas",selected:"seleccionadas",chooseScore:"Seleccioná una puntuación de 0 a 4.",moreInfo:"Más información sobre el assessment",coverageDetail:"Ver mapa completo de cobertura",profileDetail:"Ver perfil organizacional",datesDetail:"Ver datos y fechas de la estrategia",strengthsDetail:"Ver fortalezas",share:"Compartir resultado"},
 en:{profileSteps:["Scale and adoption","Current and planned products","Licensing and modules"],step:"Step",of:"of",allSteps:"View steps",hideSteps:"Hide steps",completed:"completed",selected:"selected",chooseScore:"Select a score from 0 to 4.",moreInfo:"More information about the assessment",coverageDetail:"View the complete coverage map",profileDetail:"View organizational profile",datesDetail:"View strategy data and dates",strengthsDetail:"View strengths",share:"Share result"}
 };return t[lang][key]}
function currentPhase(){return getPhases()[phaseIndex]||null}
function fieldsForProfilePhase(p=currentPhase()){return PROFILE.filter(f=>(p?.fields||[]).includes(f.key))}
function completionForCurrent(){const p=currentPhase();if(!p)return{done:0,total:0};if(p.kind==='profile'){const fs=fieldsForProfilePhase(p);return{done:fs.filter(profileComplete).length,total:fs.length}}if(p.kind==='meta')return{done:METADATA.filter(metaComplete).length,total:METADATA.length};if(p.kind==='domain'){return{done:p.domain.questions.filter(q=>answers[q.id]!==undefined).length,total:p.domain.questions.length}}if(p.kind==='module'){return{done:p.module.questions.filter(q=>answers[q.id]!==undefined).length,total:p.module.questions.length}}return{done:0,total:0}}
function updateNavProgress(){const x=completionForCurrent(),el=document.querySelector('.nav-progress');if(el)el.textContent=x.total?`${x.done} ${uxText('of')} ${x.total} ${uxText('completed')}`:''}
function clearValidation(){document.querySelectorAll('.has-error').forEach(el=>el.classList.remove('has-error'));document.querySelectorAll('.field-error').forEach(el=>{el.hidden=true;el.textContent=''})}
function showInlineError(id,msg){const card=document.getElementById(id);if(!card)return;card.classList.add('has-error');const err=card.querySelector('.field-error');if(err){err.hidden=false;err.textContent=msg}const control=card.querySelector('select,input,button');control?.focus({preventScroll:true});card.scrollIntoView({behavior:window.matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth',block:'center'});showToast(msg)}
function afterNavigation(){requestAnimationFrame(()=>{const h=document.querySelector('#screen-container h1');if(h){h.setAttribute('tabindex','-1');h.focus({preventScroll:true})}window.scrollTo({top:0,behavior:window.matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth'})})}
function resultDetails(title,content,open=false){return`<details class="result-details" ${open?'open':''}><summary>${escapeHtml(title)}</summary><div class="result-details-body">${content}</div></details>`}

let lang="es",phaseIndex=-1,maxReached=0,profile={},metadata={},moduleScope={copilot:false,powerpages:false,regulated:false},answers={};
const c=()=>CONTENT[lang];
function getPhases(){const profileLabels=uxText('profileSteps');return[...PROFILE_STEPS.map((p,i)=>({...p,label:`${c().bpfProfile} · ${profileLabels[i]}`})),{id:"meta",kind:"meta",label:c().bpfMeta},...DOMAINS.map(d=>({id:d.id,kind:"domain",label:d.name[lang],domain:d})),...MODULES.filter(m=>moduleScope[m.id]).map(m=>({id:m.id,kind:"module",label:m.name[lang],module:m})),{id:"results",kind:"results",label:c().bpfResults}];}
function activeQuestions(){const core=DOMAINS.flatMap(d=>d.questions.map(q=>({...q,domainId:d.id})));const mods=MODULES.filter(m=>moduleScope[m.id]).flatMap(m=>m.questions.map(q=>({...q,domainId:m.domainId,moduleId:m.id})));return[...core,...mods];}
function todayISO(){const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}
function escapeHtml(v){return String(v??"").replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));}
function setLanguage(next){lang=next;document.documentElement.lang=c().locale;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));document.getElementById('banner-desc').textContent=c().bannerDesc;document.getElementById('footer-privacy').textContent=c().privacy;renderBPF();renderCurrent();}
function init(){document.getElementById('banner-desc').textContent=c().bannerDesc;document.getElementById('footer-privacy').textContent=c().privacy;renderBPF();renderIntro();}
function renderBPF(){const phases=getPhases(),el=document.getElementById('bpf'),wrap=document.getElementById('bpf-wrap');if(phaseIndex<0){wrap.hidden=true;el.innerHTML='';return}wrap.hidden=false;const current=phases[phaseIndex]||phases[0],progress=Math.round(((phaseIndex+1)/phases.length)*100);const phaseButtons=phases.map((p,i)=>`<button type="button" class="bpf-phase ${i===phaseIndex?'active':''} ${i<phaseIndex?'done':''} ${i<=Math.min(maxReached,phases.length-1)?'clickable':''}" ${i<=Math.min(maxReached,phases.length-1)?`onclick="goPhase(${i})"`:'disabled'} aria-current="${i===phaseIndex?'step':'false'}"><span class="bpf-circle">${i<phaseIndex?'✓':i+1}</span><span class="bpf-label">${escapeHtml(p.label)}</span></button>`).join('');el.innerHTML=`<div class="bpf-desktop">${phaseButtons}</div><div class="bpf-mobile"><details class="bpf-mobile-details"><summary><div class="bpf-mobile-summary"><div class="bpf-mobile-copy"><span class="bpf-mobile-step">${uxText('step')} ${phaseIndex+1} ${uxText('of')} ${phases.length}</span><strong class="bpf-mobile-title">${escapeHtml(current.label)}</strong></div><span class="bpf-mobile-toggle">${uxText('allSteps')}</span><div class="bpf-progress-track" aria-label="${progress}%"><div class="bpf-progress-fill" style="width:${progress}%"></div></div></div></summary><div class="bpf-mobile-list">${phaseButtons}</div></details></div>`;}
function goPhase(i){const phases=getPhases();if(i<0||i>=phases.length||i>maxReached)return;phaseIndex=i;renderBPF();renderCurrent();afterNavigation();}
function renderCurrent(){if(phaseIndex<0){renderIntro();return}document.body.classList.remove('intro-mode');const p=getPhases()[phaseIndex];if(!p){phaseIndex=getPhases().length-1;return renderCurrent()}if(p.kind==='profile')renderProfile(p);else if(p.kind==='meta')renderMetadata();else if(p.kind==='domain')renderQuestions(p.domain);else if(p.kind==='module')renderModule(p.module);else renderResults();}
function nav(back=true,nextLabel=c().next){const x=completionForCurrent();return`<div class="nav-row">${back?`<button class="btn btn-ghost" type="button" onclick="previousPhase()">${c().back}</button>`:'<span></span>'}<div class="nav-progress" aria-live="polite">${x.total?`${x.done} ${uxText('of')} ${x.total} ${uxText('completed')}`:''}</div><button class="btn btn-primary" type="button" onclick="nextPhase()">${nextLabel}</button></div>`}
function renderIntro(){phaseIndex=-1;document.body.classList.add('intro-mode');const el=document.getElementById('screen-container'),primary=c().introItems.slice(0,3),secondary=c().introItems.slice(3);el.innerHTML=`<section id="intro-screen"><div class="intro-logo">${document.querySelector('.brand-logo').outerHTML}</div><h1 class="intro-title" tabindex="-1">${TOOL_TITLE}</h1><p class="intro-body">${c().introBody}</p><div class="intro-grid">${primary.map(x=>`<div class="intro-item">${x}</div>`).join('')}</div><button class="btn btn-primary" type="button" onclick="startAssessment()">${c().start}</button><div class="privacy-note">🔒 ${c().privacy}</div><details class="intro-more"><summary>${uxText('moreInfo')}</summary>${secondary.length?`<div class="intro-grid">${secondary.map(x=>`<div class="intro-item">${x}</div>`).join('')}</div>`:''}<div class="disclaimer">${c().disclaimer}</div></details></section>`;renderBPF();}
function startAssessment(){phaseIndex=0;maxReached=Math.max(maxReached,0);renderBPF();renderCurrent();afterNavigation();}
function previousPhase(){if(phaseIndex<=0){renderIntro();afterNavigation();return}phaseIndex--;renderBPF();renderCurrent();afterNavigation();}

)}">${c().currencyLabels[cur.key]}</span></div><div class="indicator-card"><div class="indicator-label">${c().docComm}</div><span class="status-pill ${statusClass(doc.key)}">${c().docLabels[doc.key]}</span></div></div><div class="results-actions results-primary-actions"><button class="btn btn-pdf" id="pdf-btn" onclick="downloadPdfReport()">▣ <span>${c().downloadPdf}</span></button></div><section class="result-msg-card"><h3>${msg[1]}</h3><p>${msg[2]}</p></section><h2 class="results-section-title"><span class="dot"></span>${c().domainScores}</h2>${DOMAINS.map(d=>{const s=domainScore(d);return`<div class="domain-bar-row"><div class="domain-bar-label"><span class="domain-bar-name">${d.name[lang]}</span><span class="domain-bar-pct">${s.pct}% · ${d.weight}/100</span></div><div class="domain-bar-track"><div class="domain-bar-fill ${domainBarClass(s.pct)}" style="width:${s.pct}%"></div></div></div>`}).join('')}<h2 class="results-section-title"><span class="dot" style="background:var(--magenta)"></span>${c().priorityActions}</h2>${actions.map((a,i)=>`<div class="action-card"><div class="action-num">${i+1}</div><div class="action-body"><div class="action-meta">${a.id} · ${a.category} · ${a.horizon}</div><div class="action-text">${escapeHtml(a.text)}</div></div></div>`).join('')}${resultDetails(uxText('coverageDetail'),coverage)}${resultDetails(uxText('profileDetail'),profileData)}${resultDetails(uxText('datesDetail'),keyDates)}${resultDetails(uxText('strengthsDetail'),strengths)}<div class="results-actions results-secondary-actions"><button class="btn btn-linkedin" onclick="shareLinkedIn()">in&nbsp; ${uxText('share')}</button><button class="btn btn-ghost" onclick="retake()">${c().retake}</button></div>${renderBooksCTA()}`;}
function renderBooksCTA(){return`<section class="books-cta"><div class="books-cta-header"><h3 class="books-cta-title">${c().readBooks}</h3><p class="books-cta-copy">${c().booksBody}</p></div><div class="books-grid">${BOOKS[lang].map(b=>`<article class="book-card"><div class="book-cover-wrap"><img class="book-cover" src="${bookCover(b)}" data-fallback="${bookFallback(b)}" alt="${escapeHtml(b.title)}" loading="lazy" onerror="if(!this.dataset.retried){this.dataset.retried='1';this.src=this.dataset.fallback}else{this.style.display='none';this.nextElementSibling.style.display='flex'}"/><div class="book-cover-fallback">${escapeHtml(b.title)}</div></div><div><div class="book-title">${escapeHtml(b.title)}</div><div class="book-author">Nicolás Andrés Fernández</div><a class="book-link" href="${b.url}" target="_blank" rel="noopener noreferrer">${c().bookButton} ↗</a></div></article>`).join('')}</div></section>`}
function bookCover(b){return b.cover}
function bookFallback(b){return b.fallback}
function retake(){profile={};metadata={};moduleScope={copilot:false,powerpages:false,regulated:false};answers={};phaseIndex=-1;maxReached=0;renderIntro();}
function shareLinkedIn(){const score=overallScore(),level=c().levels[healthLevel(score)][0],text=lang==='es'?`Completé el ${TOOL_TITLE}. Resultado: ${score}/100 — ${level}. Una autoevaluación de definición, cobertura, documentación, comunicación y vigencia de la estrategia.`:`I completed the ${TOOL_TITLE}. Result: ${score}/100 — ${level}. A self-assessment of strategy definition, coverage, documentation, communication, and currency.`;navigator.clipboard?.writeText(text).catch(()=>{});window.open('https://www.linkedin.com/feed/?shareActive=true','_blank','noopener');showToast(lang==='es'?'Mensaje copiado para LinkedIn.':'Message copied for LinkedIn.');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

function pdfSafe(v){return String(v??'').replace(/[–—]/g,'-').replace(/≥/g,'>=').replace(/≤/g,'<=').replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/→/g,'->').replace(/·/g,'|').replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n').replace(/Á/g,'A').replace(/É/g,'E').replace(/Í/g,'I').replace(/Ó/g,'O').replace(/Ú/g,'U').replace(/Ñ/g,'N');}
function hexRgb(h){const x=h.replace('#','');return[parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)]}
function loadImage(src,timeout=10000){return new Promise((resolve,reject)=>{const img=new Image();img.crossOrigin='anonymous';const timer=setTimeout(()=>reject(new Error('timeout')),timeout);img.onload=()=>{clearTimeout(timer);try{const canvas=document.createElement('canvas');canvas.width=img.naturalWidth||img.width;canvas.height=img.naturalHeight||img.height;canvas.getContext('2d').drawImage(img,0,0);resolve(canvas.toDataURL('image/jpeg',.9))}catch(e){reject(e)}};img.onerror=()=>{clearTimeout(timer);reject(new Error('load'))};img.src=src})}
async function resolveCover(b){for(const u of[bookCover(b),bookFallback(b)]){try{return await loadImage(u)}catch(e){}}return null}
function logoData(){return new Promise((resolve,reject)=>{const svg=document.querySelector('.brand-logo').cloneNode(true);svg.setAttribute('width','375');svg.setAttribute('height','375');const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');canvas.width=750;canvas.height=750;canvas.getContext('2d').drawImage(img,0,0,750,750);resolve(canvas.toDataURL('image/png'))};img.onerror=reject;img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(new XMLSerializer().serializeToString(svg))})}
async function downloadPdfReport(){const btn=document.getElementById('pdf-btn');if(!window.jspdf?.jsPDF){showToast(c().pdfError);return}btn.disabled=true;btn.querySelector('span').textContent=c().generatingPdf;try{const{jsPDF}=window.jspdf,doc=new jsPDF({unit:'mm',format:'a4',compress:true}),W=210,H=297,M=16;const col={indigo:hexRgb('#5552B4'),blue:hexRgb('#3895FF'),teal:hexRgb('#27B8C6'),gold:hexRgb('#FFC000'),magenta:hexRgb('#BD47BD'),red:hexRgb('#EE0055'),ink:hexRgb('#0B0B0F'),surface:hexRgb('#16161D'),muted:hexRgb('#666978'),line:hexRgb('#D9DAE1'),white:[255,255,255]};const score=overallScore(),level=healthLevel(score),msg=c().levels[level],cur=currencyStatus(),dc=docCommStatus(),actions=priorityActions(),covers=await Promise.all(BOOKS[lang].map(resolveCover)),logo=await logoData().catch(()=>null);let page=1,y=20;const txt=x=>doc.setTextColor(...x),fill=x=>doc.setFillColor(...x),draw=x=>doc.setDrawColor(...x),wrap=(t,w)=>doc.splitTextToSize(pdfSafe(t),w);function footer(dark=false){draw(dark?[55,55,65]:col.line);doc.line(M,H-14,W-M,H-14);doc.setFont('helvetica','normal');doc.setFontSize(7);txt(dark?[185,188,198]:col.muted);doc.text(pdfSafe(c().reportFooter),M,H-8);doc.textWithLink('LinkedIn: linkedin.com/in/nfernandezba',W-M-46,H-8,{url:'https://www.linkedin.com/in/nfernandezba'});doc.text(String(page),W-M,H-8,{align:'right'})}function section(title,accent=col.indigo){if(y>H-30){footer();doc.addPage();page++;y=20}fill(accent);doc.roundedRect(M,y-4,3,6,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);txt(col.ink);doc.text(pdfSafe(title),M+6,y);y+=9}function para(text,size=8.7,color=col.muted,width=W-2*M){doc.setFont('helvetica','normal');doc.setFontSize(size);txt(color);const lines=wrap(text,width);doc.text(lines,M,y);y+=lines.length*4.2+3}function ensure(h){if(y+h>H-20){footer();doc.addPage();page++;y=20}}
fill(col.ink);doc.rect(0,0,W,H,'F');[col.magenta,col.indigo,col.blue,col.teal,col.gold].forEach((x,i)=>{fill(x);doc.rect(i*W/5,0,W/5+.2,4,'F')});if(logo)doc.addImage(logo,'PNG',M,19,25,25);doc.setFont('helvetica','bold');doc.setFontSize(10);txt(col.teal);doc.text('COE TOOLKIT',M,59);doc.setFontSize(22);txt(col.white);doc.text(wrap(TOOL_TITLE,175),M,72);doc.setFont('helvetica','normal');doc.setFontSize(12);txt([185,188,200]);doc.text(pdfSafe(c().reportTitle),M,99);fill(col.surface);doc.roundedRect(M,120,W-2*M,75,5,5,'F');doc.setFont('helvetica','bold');doc.setFontSize(40);txt(col.white);doc.text(String(score),M+13,160);doc.setFontSize(13);txt([170,173,185]);doc.text('/100',M+43,160);doc.setFontSize(16);txt(col.white);doc.text(pdfSafe(msg[0]),M+13,179);doc.setFontSize(9);txt(col.teal);doc.text(pdfSafe(`${c().currency}: ${c().currencyLabels[cur.key]}`),M+95,151);doc.text(pdfSafe(`${c().docComm}: ${c().docLabels[dc.key]}`),M+95,165);doc.setFont('helvetica','normal');doc.setFontSize(8.5);txt([175,178,190]);doc.text(`${pdfSafe(c().generated)} ${pdfSafe(new Intl.DateTimeFormat(c().locale,{year:'numeric',month:'long',day:'numeric'}).format(new Date()))}`,M,219);doc.setFont('helvetica','bold');txt(col.blue);doc.textWithLink('Nico Fernandez | LinkedIn',M,226,{url:'https://www.linkedin.com/in/nfernandezba'});doc.setFont('helvetica','normal');txt([175,178,190]);doc.text(wrap(c().disclaimer,W-2*M),M,232);footer(true);
doc.addPage();page++;y=22;section(lang==='es'?'Resumen ejecutivo':'Executive summary');doc.setFont('helvetica','bold');doc.setFontSize(11);txt(col.ink);doc.text(pdfSafe(msg[1]),M,y);y+=7;para(msg[2]);section(c().domainScores,col.blue);DOMAINS.forEach(d=>{ensure(14);const s=domainScore(d);doc.setFont('helvetica','bold');doc.setFontSize(8.2);txt(col.ink);doc.text(pdfSafe(d.name[lang]),M,y);doc.setFont('helvetica','normal');txt(col.muted);doc.text(`${s.pct}%`,W-M,y,{align:'right'});fill([235,236,241]);doc.roundedRect(M,y+2,W-2*M,4,2,2,'F');fill(s.pct<40?col.red:s.pct<75?col.gold:col.teal);doc.roundedRect(M,y+2,(W-2*M)*s.pct/100,4,2,2,'F');y+=13});section(c().profileTitle,col.teal);PROFILE.forEach(f=>{ensure(10);doc.setFont('helvetica','bold');doc.setFontSize(7.6);txt(col.muted);doc.text(pdfSafe(c().profileDisplay[f.key]),M,y);doc.setFont('helvetica','normal');txt(col.ink);doc.text(wrap(formatProfileValue(f.key),112),M+58,y);y+=9});section(c().keyDates,col.gold);['status','creation','version','update','review','reviewFreq','nextReview','owner','location'].forEach(k=>{ensure(10);doc.setFont('helvetica','bold');doc.setFontSize(7.6);txt(col.muted);doc.text(pdfSafe(c().metaDisplay[k]),M,y);doc.setFont('helvetica','normal');txt(col.ink);doc.text(wrap(formatMetaValue(k),112),M+58,y);y+=9});footer();
doc.addPage();page++;y=22;section(c().priorityActions,col.magenta);actions.forEach((a,i)=>{const lines=wrap(a.text,W-2*M-28),h=Math.max(22,12+lines.length*4);ensure(h+4);fill([249,247,250]);draw([231,222,234]);doc.roundedRect(M,y-4,W-2*M,h,3,3,'FD');fill(col.indigo);doc.circle(M+7,y+5,4,'F');doc.setFont('helvetica','bold');doc.setFontSize(7.5);txt(col.white);doc.text(String(i+1),M+7,y+7,{align:'center'});doc.setFontSize(7);txt(col.muted);doc.text(pdfSafe(`${a.id} | ${a.category} | ${a.horizon}`),M+16,y);doc.setFont('helvetica','normal');doc.setFontSize(8);txt(col.ink);doc.text(lines,M+16,y+6);y+=h+5});section(c().coverageMap,col.teal);activeQuestions().forEach(q=>{ensure(9);const v=answers[q.id],label=c().coverageLabels[coverageStatus(v)];doc.setFont('helvetica','bold');doc.setFontSize(7.2);txt(col.indigo);doc.text(q.id,M,y);doc.setFont('helvetica','normal');txt(col.ink);doc.text(wrap(q.title[lang],93),M+17,y);txt(col.muted);doc.text(pdfSafe(label),W-M,y,{align:'right'});y+=8});footer();
doc.addPage();page++;y=22;section(c().scaleGuide,col.indigo);c().scaleDefs.forEach((d,i)=>{const lines=wrap(d[1],W-2*M-48),h=Math.max(15,7+lines.length*3.8);ensure(h+2);fill(i%2?[252,252,253]:[247,247,250]);doc.roundedRect(M,y-4,W-2*M,h,2,2,'F');doc.setFont('helvetica','bold');doc.setFontSize(7.2);txt(col.indigo);doc.text(wrap(d[0],42),M+4,y);doc.setFont('helvetica','normal');txt(col.muted);doc.text(lines,M+48,y);y+=h+3});section(c().readBooks,col.teal);para(c().booksBody,8.4);const cardW=(W-2*M-8)/2,cardY=y;BOOKS[lang].forEach((b,i)=>{const x=M+i*(cardW+8);fill(col.surface);doc.roundedRect(x,cardY,cardW,69,4,4,'F');if(covers[i])doc.addImage(covers[i],'JPEG',x+5,cardY+5,31,49);else{fill(i?col.teal:col.indigo);doc.roundedRect(x+5,cardY+5,31,49,2,2,'F')}doc.setFont('helvetica','bold');doc.setFontSize(7.8);txt(col.white);doc.text(wrap(b.title,cardW-44),x+40,cardY+10);doc.setFont('helvetica','normal');doc.setFontSize(7);txt([178,181,193]);doc.text('Nicolas Andres Fernandez',x+40,cardY+41);doc.setFont('helvetica','bold');doc.setFontSize(7.5);txt(col.blue);doc.textWithLink(pdfSafe(c().bookButton),x+40,cardY+52,{url:b.url});doc.link(x,cardY,cardW,69,{url:b.url})});footer();doc.save(`Power-Platform-Copilot-Studio-Environment-Strategy-Quick-Assessment-${lang}-${todayISO()}.pdf`)}catch(e){console.error(e);showToast(c().pdfError)}finally{btn.disabled=false;btn.querySelector('span').textContent=c().downloadPdf}}
init();
</script>
